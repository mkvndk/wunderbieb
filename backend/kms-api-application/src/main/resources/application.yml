spring:
  application:
    name: kms-api-application
  datasource:
    url: ${KMS_DB_URL:jdbc:postgresql://localhost:5432/wunderbieb}
    username: ${KMS_DB_USERNAME:kms}
    password: ${KMS_DB_PASSWORD:kms}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

kms:
  security:
    oidc-enabled: ${KMS_OIDC_ENABLED:false}
    debug-role-header-enabled: ${KMS_DEBUG_ROLE_HEADER_ENABLED:true}
    debug-role-header-name: X-Demo-Role-Code
    admin-required-role-code: PLATFORM_ADMIN
  storage:
    minio:
      endpoint: ${KMS_MINIO_ENDPOINT:}
      access-key: ${KMS_MINIO_ACCESS_KEY:}
      secret-key: ${KMS_MINIO_SECRET_KEY:}
      bucket: ${KMS_MINIO_BUCKET:wunderbieb-documents}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
